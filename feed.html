<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive — Feed</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/feed.css" />
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-left">
            <div class="brand">
                <div class="brand-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.1v7.8L12 19.82 5 15.9V8.1L12 4.18z" />
                    </svg>
                </div>
                <span class="brand-name">Hive</span>
            </div>
        </div>
        <div class="navbar-right">
            <div class="user-profile">
                <img class="user-avatar" src="" alt="Avatar" />
                <span class="user-name"></span>
            </div>
            <button class="btn-logout">Logout</button>
        </div>
    </nav>

    <!-- Main layout: feed + sidebar -->
    <div class="main-layout">

        <!-- Left: Feed -->
        <div class="feed-column">
            <div id="feed"></div>
        </div>

        <!-- Right: Discover Users Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-card">
                <h3 class="sidebar-title">Discover Users</h3>
                <div id="userList"></div>
            </div>
        </aside>

    </div>

    <!-- Floating create post button -->
    <button class="floatingButton" id="fbCreatePost">+</button>

    <!-- Create Post Modal -->
    <div id="createPostModal" class="modal hidden">
        <div class="modal-content">
            <button class="close">&times;</button>
            <h3 class="modal-title">New Post</h3>
            <form id="createPostForm">
                <textarea id="postContent" placeholder="What's on your mind?"></textarea>
                <div class="modal-actions">
                    <button type="button" id="cancelPost" class="btn-cancel-modal">Cancel</button>
                    <button type="submit" class="btn-post-modal">Post</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/feed.js"></script>
</body>

</html>
