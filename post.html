<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap"
        rel="stylesheet" />
        
    <link rel="stylesheet" href="css/feed.css" />
    <link rel="stylesheet" href="css/post.css" />
</head>

<body>

        <!-- Navbar (same as feed.html) -->
    <nav class="navbar">
        <div class="navbar-left">
            <div class="brand">
                <div class="brand-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.1v7.8L12 19.82 5 15.9V8.1L12 4.18z" />
                    </svg>
                </div>
                <span class="brand-name">Hive</span>
            </div>
        </div>
        <div class="navbar-right">
            <div class="user-profile">
                <img class="user-avatar" src="" alt="Avatar" />
                <span class="user-name"></span>
            </div>
            <button class="btn-logout">Logout</button>
        </div>
    </nav>
    //--- Back button and post container --------------
    <div class="post-header-bar">
        <button class="btn-back" onclick="window.location.href='feed.html'">← Back to Feed</button>
    </div>
    <div class="post-container">
        <div id="singlePost" class="card">
            <div class="post-header">
                <button class="btn-delete" id="deletePostBtn" style="display: none;">🗑️</button>
                <div class="author-info">
                    <img class="author-avatar" src="" alt="Author Avatar" />
                    <div>
                        <h3 class="author-name"></h3>
                        <span class="post-timestamp"></span>
                    </div>
                </div>
            </div>

            <p class="post-content"></p>

            <div class="post-footer">
                <button class="like-btn" id="likeBtn">
                    <span class="like-count">0</span>
                </button>
            </div>
        </div>
    </div>


    <script src="js/storage.js"></script>
    <script src="js/post.js"></script>
</body>

</html>
