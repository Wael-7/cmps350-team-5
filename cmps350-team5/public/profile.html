<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive — Profile</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/feed.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>

    <!-- Navbar (same as feed.html) -->
    <nav class="navbar">
        <div class="navbar-left">
            <div class="brand" onclick="window.location.href='feed.html'" style="cursor:pointer;">
                <div class="brand-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.1v7.8L12 19.82 5 15.9V8.1L12 4.18z" />
                    </svg>
                </div>
                <span class="brand-name">Hive</span>
            </div>
        </div>
        <div class="navbar-right">
            <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z" />
                </svg>
            </button>
            <div class="user-profile" id="navUserProfile">
                <img class="user-avatar" id="navAvatar" src="" alt="Avatar" />
                <span class="user-name" id="navUsername"></span>
            </div>
            <button class="btn-logout" id="navLogout">Logout</button>
        </div>
    </nav>

    <!-- Profile content -->
    <div class="profile-container">

        <!-- User Info -->
        <div class="profile-header">
            <img id="profilePic" class="profile-pic" alt="Profile Picture" />
            <h2 id="username" class="profile-username"></h2>
            <p id="bio" class="profile-bio"></p>

            <div class="profile-stats">
                <span id="followersCount" class="stat-count"></span> Followers
                •
                <span id="followingCount" class="stat-count"></span> Following
            </div>

            <div class="profile-buttons">
                <button id="followBtn" class="btn-action" style="display:none;"></button>
                <button id="editProfileBtn" class="btn-action" style="display:none;">Edit Profile</button>
                <button id="backToFeedBtn" class="btn-back">← Back to Feed</button>
            </div>
        </div>

        <!-- Inline Edit Form (hidden by default) -->
        <div class="edit-form-section" id="editFormSection">
            <h3 class="edit-form-title">Edit Profile</h3>

            <div class="edit-form-group">
                <label class="edit-form-label" for="editUsername">Username</label>
                <input class="edit-form-input" type="text" id="editUsername" placeholder="Your username"
                    maxlength="30" />
                <span class="edit-form-error" id="editUsernameError"></span>
            </div>

            <div class="edit-form-group">
                <label class="edit-form-label" for="editBio">Bio</label>
                <textarea class="edit-form-textarea" id="editBio" placeholder="Tell people about yourself..."
                    maxlength="160"></textarea>
            </div>

            <div class="edit-form-group">
                <label class="edit-form-label" for="editProfilePic">Profile Picture URL</label>
                <input class="edit-form-input" type="url" id="editProfilePic"
                    placeholder="https://example.com/photo.jpg" />
                <span class="edit-form-error" id="editPicError"></span>
            </div>

            <div class="edit-form-actions">
                <button class="btn-cancel-edit" id="cancelEditBtn">Cancel</button>
                <button class="btn-save-profile" id="saveProfileBtn">Save Changes</button>
            </div>
        </div>

        <!-- User Posts -->
        <div class="posts-section">
            <h3>Posts</h3>
            <div id="userPosts"></div>
        </div>

    </div>

    <script src="js/storage.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
