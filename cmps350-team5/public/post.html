<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive — Post</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/feed.css" />
    <link rel="stylesheet" href="css/post.css" />
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-left">
            <div class="brand">
                <div class="brand-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.1v7.8L12 19.82 5 15.9V8.1L12 4.18z" />
                    </svg>
                </div>
                <span class="brand-name">Hive</span>
            </div>
        </div>
        <div class="navbar-right">
            <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z"/>
                </svg>
            </button>
            <div class="user-profile">
                <img class="user-avatar" src="" alt="Avatar" />
                <span class="user-name"></span>
            </div>
            <button class="btn-logout">Logout</button>
        </div>
    </nav>

    <!-- Back button bar -->
    <div class="post-header-bar">
        <button class="btn-back" onclick="window.location.href='feed.html'">← Back to Feed</button>
    </div>

    <!-- Post + Comments -->
    <div class="post-container">

        <!-- Post Card -->
        <div id="singlePost" class="post-card">

            <!-- Post Header -->
            <div class="post-header">
                <div class="author-info">
                    <img class="author-avatar" src="" alt="Author Avatar" />
                    <div class="author-meta">
                        <h3 class="author-name"></h3>
                        <span class="post-timestamp"></span>
                    </div>
                </div>
                <button class="btn-delete" id="deletePostBtn" style="display: none;">🗑️</button>
            </div>

            <!-- Post Content -->
            <p class="post-content"></p>

            <!-- Like Button -->
            <div class="post-footer">
                <button class="like-btn" id="likeBtn">
                    ❤️ <span class="like-count">0</span>
                </button>
            </div>

        </div>

        <!-- Comments Section -->
        <div class="comments-section">

            <h4 class="comments-title">Comments</h4>

            <!-- Add Comment -->
            <div class="add-comment">
                <textarea id="commentInput" placeholder="Write a comment..."></textarea>
                <button class="btn-submit-comment" id="submitComment">Post Comment</button>
            </div>

            <!-- Comments List -->
            <ul class="comments-list" id="commentsList"></ul>

        </div>

    </div>

    <script src="js/storage.js"></script>
    <script src="js/post.js"></script>
</body>

</html>
